name: Build, Test and Deploy

on:
  push:
    branches:
      - main
      - test-pipeline
  pull_request:
    branches:
      - main
  workflow_dispatch:


permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./infra
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Run test
        working-directory: .
        run: |
          pip install -r requirements.txt -r requirements-dev.txt
          pytest -v

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::027252078102:role/github-actions-deploy
          aws-region: eu-central-1

      - name: Terraform Setup
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_wrapper: false

      - name: Terraform init
        run: terraform init

      - name: Terraform Format Check
        run: terraform fmt -check

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: terraform plan

      - name: Terraform Apply
        if: github.event_name == 'push'
        run: terraform apply -auto-approve

      - name: Login to ECR
        if: github.event_name == 'push'
        uses: aws-actions/amazon-ecr-login@v2

      - name: Get ECR URL
        id: ecr
        if: github.event_name == 'push'
        run: echo "url=$(terraform output -raw ecr_repository_url)" >> "$GITHUB_OUTPUT"

      - name: Build and push Docker image
        if: github.event_name == 'push'
        working-directory: .
        env:
          ECR_URL: ${{ steps.ecr.outputs.url }}
        run: |
          docker build -t $ECR_URL:latest -t $ECR_URL:${{ github.sha }} .
          docker push $ECR_URL:latest
          docker push $ECR_URL:${{ github.sha }}

      - name: Force ECS redeploy
        if: github.event_name == 'push'
        run: |
          aws ecs update-service \
            --cluster url-shortener \
            --service aws_ecs_services \
            --force-new-deployment \
            --region eu-central-1